<!DOCTYPE html>
<html lang="en" class="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Rabab Ali</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#ee2b2b"
          },
          fontFamily: {
            display: ["Plus Jakarta Sans", "sans-serif"]
          }
        }
      }
    }
  </script>
</head>

<body class="bg-[#fcf8f8] text-[#1b0d0d] font-display">

<!-- HEADER -->
<header class="max-w-6xl mx-auto flex justify-between items-center py-6 px-4 border-b">
  <h2 class="text-xl font-bold">Rabab Ali</h2>
  <nav class="flex gap-6 items-center">
    <a href="portfolio.html">Home</a>
    <a href="services.html">Portfolio</a>
    <a class="text-primary font-bold">Contact</a>
    <a href="https://www.instagram.com/media_masters_lb/" target="_blank">
      <button class="bg-primary px-4 py-2 rounded-lg font-bold text-white">
        Let's Talk
      </button>
    </a>
  </nav>
</header>

<!-- HERO -->
<section class="max-w-6xl mx-auto px-4 py-14">
  <h1 class="text-4xl font-extrabold mb-4">Contact Rabab Ali</h1>
  <p class="text-gray-600 max-w-xl">
    I'm here to help you elevate your digital presence through strategic social media management.
  </p>
</section>

<!-- MAIN -->
<main class="max-w-6xl mx-auto px-4 pb-20 grid md:grid-cols-2 gap-14">

<!-- FORM -->
<div>
  <h3 class="text-2xl font-bold mb-6">Get in Touch</h3>

  <form id="contactForm" class="space-y-5">

    <div>
      <label class="block mb-2 font-medium">Full Name</label>
      <input
        id="name"
        name="name"
        type="text"
        placeholder="Enter your name"
        class="w-full rounded-lg border p-4"
        required
      />
    </div>

    <div>
      <label class="block mb-2 font-medium">Email Address</label>
      <input
        id="email"
        name="email"
        type="email"
        placeholder="email@example.com"
        class="w-full rounded-lg border p-4"
        required
      />
    </div>

    <div>
      <label class="block mb-2 font-medium">How can I help you?</label>
      <textarea
        id="message"
        name="message"
        placeholder="Tell me about your project or inquiry..."
        class="w-full rounded-lg border p-4 min-h-[150px]"
        required
      ></textarea>
    </div>

    <button
      type="submit"
      class="bg-primary text-white font-bold px-8 py-4 rounded-lg"
    >
      Send Message
    </button>

  </form>
</div>

<!-- INFO -->
<div class="space-y-10">

  <div>
    <h4 class="uppercase tracking-widest text-gray-500 font-bold mb-4">
      Contact Information
    </h4>

    <p><strong>Email:</strong> rabab.ali199888@gmail.com</p>
    <p><strong>Location:</strong> Lebanon, Nabatieh</p>
  </div>

  <div>
    <h4 class="uppercase tracking-widest text-gray-500 font-bold mb-4">
      Follow Me
    </h4>

    <a
      href="https://www.google.com/maps?q=33.8938,35.5018"
      target="_blank"
      class="text-2xl"
    >
      📍
    </a>
  </div>

  <div>
    <input
      type="text"
      id="mapLink"
      placeholder="Paste Google Maps location link"
      class="w-full border p-3 rounded-lg"
    />

    <button
      onclick="showMap()"
      class="mt-3 bg-primary px-6 py-3 rounded-lg font-bold"
    >
      Show on Map
    </button>

    <div id="mapContainer" class="hidden mt-4 h-64 border rounded-lg overflow-hidden">
      <iframe id="mapFrame" class="w-full h-full"></iframe>
    </div>
  </div>

</div>
</main>

<!-- FOOTER -->
<footer class="border-t py-8 text-center text-sm text-gray-500">
  © 2026 Rabab Ali. All rights reserved.
</footer>

<!-- JS -->
<script>
document.getElementById("contactForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const message = document.getElementById("message").value;

  try {
    const res = await fetch("http://localhost:3000/send", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, email, message })
    });

    const text = await res.text();
    alert(text);
    e.target.reset();

  } catch {
    alert("Server not connected ❌");
  }
});

function showMap() {
  const link = document.getElementById("mapLink").value;
  if (!link) return alert("Paste a Google Maps link");

  document.getElementById("mapFrame").src =
    link.replace("/maps/", "/maps/embed/");
  document.getElementById("mapContainer").classList.remove("hidden");
}
</script>

</body>
</html>
